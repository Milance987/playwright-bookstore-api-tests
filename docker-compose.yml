# @format

version: '3.8'

services:
  api-tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookstore-api-tests
    environment:
      - API_BASE_URL=${API_BASE_URL:-https://fakerestapi.azurewebsites.net}
      - CI=true
    volumes:
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report
    ports:
      - '9323:9323'
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
