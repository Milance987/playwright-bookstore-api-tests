# @format

name: API Automation Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API Base URL'
        required: false
        default: 'https://fakerestapi.azurewebsites.net'

jobs:
  # Native Node.js Test Execution
  test-native:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Tests
        env:
          API_BASE_URL: ${{ inputs.api_base_url || 'https://fakerestapi.azurewebsites.net' }}
        run: npm test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-native
          path: playwright-report/
          retention-days: 30

      - name: Upload JUnit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report-native
          path: test-results/junit.xml
          retention-days: 30

  # Docker-based Test Execution
  test-docker:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: bookstore-api-tests:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Tests in Docker
        env:
          API_BASE_URL: ${{ inputs.api_base_url || 'https://fakerestapi.azurewebsites.net' }}
        run: |
          docker run \
            -e API_BASE_URL=${{ env.API_BASE_URL }} \
            -e CI=true \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            -v ${{ github.workspace }}/playwright-report:/app/playwright-report \
            bookstore-api-tests:latest

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-docker
          path: playwright-report/
          retention-days: 30

      - name: Upload JUnit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report-docker
          path: test-results/junit.xml
          retention-days: 30

  # Test Report Summary
  test-report:
    needs: [test-native, test-docker]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Publish Test Report Summary
        run: |
          echo "## 📊 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Native Execution" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.test-native.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🐳 Docker Execution" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.test-docker.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Generated Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Playwright Reports (Native & Docker)" >> $GITHUB_STEP_SUMMARY
          echo "- JUnit XML Reports (Native & Docker)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "For detailed results, check the **Artifacts** tab above." >> $GITHUB_STEP_SUMMARY

      - name: Check Test Status
        run: |
          if [ "${{ needs.test-native.result }}" != "success" ] || [ "${{ needs.test-docker.result }}" != "success" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          echo "✅ All tests passed!"
